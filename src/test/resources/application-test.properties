firebase.enabled=false

firebase.type=service_account
firebase.project_id=test-project
firebase.private_key_id=test
firebase.private_key=test
firebase.client_email=test@test.iam.gserviceaccount.com
firebase.client_id=123
firebase.auth_uri=https://accounts.google.com/o/oauth2/auth
firebase.token_uri=https://oauth2.googleapis.com/token
firebase.auth_provider_x509_cert_url=https://www.googleapis.com/oauth2/v1/certs
firebase.client_x509_cert_url=https://example.com
firebase.universe_domain=googleapis.com

spring.application.name=aydede-test

livekit.url=wss://test.livekit.cloud
livekit.api-key=APItestkey
livekit.api-secret=testsecretkeyforjwtsigningonly
livekit.api-host=https://test.livekit.cloud
livekit.agent-name=aydede-test

config.allowed-origins=http://localhost:*

rate-limit.user-per-minute=30
rate-limit.user-per-hour=100
rate-limit.ip-per-minute=60

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.probes.enabled=true
management.health.redis.enabled=true
management.health.db.enabled=true

logging.level.com.server.aydede=INFO
